name: Daily README Update

on:
  schedule:
    - cron: "0 19 * * *"  # 05:00 AM Sydney
    - cron: "0 9 * * *"   # 07:00 PM Sydney
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update timestamp
        run: |
          TIME=$(date)
          sed -i "s|Last updated:.*|Last updated: $TIME|" README.md

      - name: Commit and push
        run: |
          git config user.name "krischuang"
          git config user.email "kris.kh.chuang@gmail.com"
          git add README.md
          git commit -m "chore: update timestamp" || echo "No changes"
          git push
